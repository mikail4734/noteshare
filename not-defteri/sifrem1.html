<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteShare | Kodu Doğrula</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            font-family: 'Inter', sans-serif; 
        }
        .glass { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px); 
        }
        /* Kod girişi için özel stil */
        .code-input {
            letter-spacing: 0.5em;
            padding-left: 0.5em;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <div class="glass rounded-[2rem] shadow-2xl p-10 relative overflow-hidden">
            
            <div class="mb-6">
                <a href="sifrem.html" class="text-slate-500 hover:text-indigo-600 text-sm transition-all">
                    <i class="fas fa-arrow-left mr-2"></i>Geri Dön
                </a>
            </div>

            <h2 class="text-2xl font-bold text-slate-800 mb-2 text-center">Kodu Doğrula</h2>
            <p class="text-slate-500 text-sm mb-8 text-center">
                E-posta adresine gönderdiğimiz 4 haneli kodu aşağıya gir.
            </p>
            
            <form action="sifrem1.html" method="POST" class="space-y-6">
                
                <input type="hidden" name="email" id="hiddenEmail">
                
                <div class="flex justify-center">
                    <input type="text" 
                           name="code" 
                           maxlength="4" 
                           placeholder="0000" 
                           required
                           pattern="\d{4}"
                           title="Lütfen 4 haneli kodu girin"
                           class="code-input w-48 text-center text-3xl font-bold bg-slate-50 border border-slate-200 rounded-xl py-4 outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-slate-700">
                </div>

                <button type="submit" 
                    class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold text-sm shadow-lg hover:bg-indigo-700 transition-all flex items-center justify-center gap-2">
                    <i class="fas fa-check-circle"></i>
                    Kodu Onayla ve Devam Et
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-slate-400 text-xs">
                    Kod gelmedi mi? <a href="#" class="text-indigo-600 font-semibold hover:underline">Tekrar Gönder</a>
                </p>
            </div>
        </div>
        
        <div class="text-center mt-6">
            <p class="text-white/70 text-xs tracking-widest uppercase font-bold">
                NotesHARE GÜVENLİK KATMANI V2.0
            </p>
        </div>
    </div>

    <script>
        // Sayfa yüklendiğinde URL'deki ?email=test@mail.com kısmını yakalar
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const email = urlParams.get('email');
            if (email) {
                document.getElementById('hiddenEmail').value = email;
                console.log("Doğrulanacak Email:", email);
            }
        }

        // Sadece rakam girilmesini sağlayan küçük bir kontrol
        const codeInput = document.querySelector('input[name="code"]');
        codeInput.addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });
    </script>
</body>
</html>
