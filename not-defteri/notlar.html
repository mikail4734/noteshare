    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script>



    // Quill Editör Başlatma (En üstte olmalı ki onload içinde kullanabilelim)
    var quill = new Quill('#editor', {
        theme: 'snow',
        placeholder: 'Notlarını buraya yaz...',
        modules: { 
            toolbar: [
                [{ 'header': [1, 2, false] }], 
                ['bold', 'italic', 'underline', 'strike'], 
                [{ 'list': 'ordered'}, { 'list': 'bullet' }], 
                ['image', 'code-block', 'link', 'clean']
            ] 
        }
    });

function paylas() {
    const link = window.location.href; // Mevcut URL'yi alır (id dahil)
    navigator.clipboard.writeText(link).then(() => {
        alert("Not linki kopyalandı! İstediğin yerde paylaşabilirsin.");
    }).catch(err => {
        console.error("Kopyalama hatası:", err);
    });
}



   // ✅ TEK VE GÜÇLÜ BİR ONLOAD FONKSİYONU
window.onload = async () => {
    // 1. Önce Dil Ayarını Yap
    const savedLang = localStorage.getItem('prefLang') || 'tr';
    changeLanguage(savedLang);

    // 2. URL'den ID'yi al
    const urlParams = new URLSearchParams(window.location.search);
    const noteId = urlParams.get('id');

    if (noteId) {
        console.log("Not yükleniyor, ID:", noteId);
        try {
            const response = await fetch(`http://localhost:3000/getNote/${noteId}`);
            if (!response.ok) throw new Error("Veri çekilemedi");
            
            const note = await response.json();
            console.log("Gelen veri:", note);

            // Başlığı Doldur
            const titleInput = document.getElementById('title');
            if (titleInput) titleInput.value = note.title;
            
            // Quill Editörü Doldur
            if (note.content) {
                quill.root.innerHTML = note.content;
            }

            // Eğer varsa kategori/ders kısmını da doldur (HTML'de ID'si ders olan yer)
            const dersInput = document.getElementById('dersInput');
            if (dersInput) dersInput.value = note.category || '';

        } catch (err) {
            console.error("Hata:", err);
            // alert("Not yüklenirken bir hata oluştu. Sunucuyu kontrol edin.");
        }
    }
};

    // ✅ KAYDET / GÜNCELLE FONKSİYONU
    async function saveToDatabase() {
        const titleInput = document.getElementById('title');
        const title = titleInput.value.trim();
        const content = quill.root.innerHTML; 

        // URL'de ID varsa güncelleme, yoksa yeni kayıt yapacağız
        const urlParams = new URLSearchParams(window.location.search);
        const noteId = urlParams.get('id');

        if (!title || content === "<p><br></p>" || content.trim() === "") {
            alert("Lütfen bir başlık ve içerik yazın!");
            return;
        }

        // Eğer ID varsa 'updateNote', yoksa 'saveNote' endpointine gönderiyoruz
        const endpoint = noteId ? `http://localhost:3000/updateNote/${noteId}` : "http://localhost:3000/saveNote";
        const method = noteId ? "PUT" : "POST";

        try {
            const response = await fetch(endpoint, {
                method: method,
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ title, content })
            });

            const data = await response.json();

            if (response.ok) {
                alert("✅ İşlem Başarılı!");
                window.location.href = "index.html"; // Liste sayfana dön
            } else {
                alert("❌ Hata: " + data.message);
            }
        } catch (err) {
            console.error("Sunucu Hatası:", err);
            alert("❌ Sunucuya bağlanılamadı.");
        }
    }

    // --- Diğer Yardımcı Fonksiyonlar (Aynı Kalabilir) ---

    const translations = {
        'tr': { 'navTitle': 'Düzenleme Modu', 'btnSave': 'Kaydet', 'btnShare': 'Paylaş', 'labelL': 'Eğitim Seviyesi', 'labelS': 'Ders / Bölüm Adı', 'phTitle': 'Not Başlığını Buraya Girin...', 'phEditor': 'Derse ait detayları buraya yazmaya başla...' },
        'en': { 'navTitle': 'Editing Mode', 'btnSave': 'Save', 'btnShare': 'Share', 'labelL': 'Education Level', 'labelS': 'Subject Name', 'phTitle': 'Enter Title Here...', 'phEditor': 'Start writing your lesson notes...' }
    };

    function changeLanguage(lang) {
        const currentLangDisplay = document.getElementById('currentLangDisplay');
        if (currentLangDisplay) currentLangDisplay.innerText = lang.toUpperCase();
        
        const t = translations[lang];
        if(document.getElementById('navTitle')) document.getElementById('navTitle').innerText = t.navTitle;
        if(document.getElementById('btnSaveText')) document.getElementById('btnSaveText').innerText = t.btnSave;
        
        const titleInput = document.getElementById('title');
        if(titleInput) titleInput.placeholder = t.phTitle;
        
        quill.root.dataset.placeholder = t.phEditor;
        localStorage.setItem('prefLang', lang);
    }

    function toggleFocusMode() {
        document.body.classList.toggle('focus-mode');
        const icon = document.getElementById('focusIcon');
        const header = document.getElementById('editorHeader');
        if(document.body.classList.contains('focus-mode')) {
            if(icon) icon.classList.replace('fa-expand-arrows-alt', 'fa-compress-arrows-alt');
            if(header) header.classList.add('hidden');
        } else {
            if(icon) icon.classList.replace('fa-compress-arrows-alt', 'fa-expand-arrows-alt');
            if(header) header.classList.remove('hidden');
        }
    }

// --- PAYLAŞIM MODALI FONKSİYONLARI ---

function openShareModal() {
    const modal = document.getElementById('shareModal');
    const shareLinkInput = document.getElementById('shareLink');
    
    // Şu anki sayfanın tam linkini input içine yazar
    shareLinkInput.value = window.location.href;
    
    // Modalı görünür yapar
    modal.classList.remove('hidden');
    modal.classList.add('flex'); // Tailwind 'hidden'ı kaldırınca 'flex' gerekebilir
}

function closeShareModal() {
    const modal = document.getElementById('shareModal');
    modal.classList.add('hidden');
    modal.classList.remove('flex');
}

function copyLink() {
    const shareLinkInput = document.getElementById('shareLink');
    shareLinkInput.select();
    document.execCommand('copy'); // Eski ama güvenilir yöntem
    
    // Modern tarayıcılar için alternatif (opsiyonel)
    navigator.clipboard.writeText(shareLinkInput.value).then(() => {
        alert("Bağlantı kopyalandı!");
    });
}

function shareOnWhatsApp(title, url) {
    const text = encodeURIComponent(`${title}: ${url}`);
    window.open(`https://api.whatsapp.com/send?text=${text}`, '_blank');
}

// --- VERİ ÇEKME VE DOLDURMA KONTROLÜ ---

// URL'den ID'yi çek ve veritabanından getir
async function loadNoteFromDB() {
    const urlParams = new URLSearchParams(window.location.search);
    const noteId = urlParams.get('id');

    if (!noteId) return; // ID yoksa (yeni not ise) işlem yapma

    try {
        const response = await fetch(`http://localhost:3000/getNote/${noteId}`);
        if (!response.ok) throw new Error("Not bulunamadı");

        const note = await response.json();

        // Başlığı yerleştir
        const titleField = document.getElementById('title');
        if (titleField) titleField.value = note.title;

        // Quill Editör içeriğini yerleştir
        if (note.content && typeof quill !== 'undefined') {
            quill.root.innerHTML = note.content;
        }

        console.log("✅ Not başarıyla yüklendi:", note.title);
    } catch (err) {
        console.error("❌ Not yüklenirken hata:", err);
    }
}

// Sayfa açıldığında çalıştır
window.addEventListener('DOMContentLoaded', () => {
    loadNoteFromDB();
});


</script>
